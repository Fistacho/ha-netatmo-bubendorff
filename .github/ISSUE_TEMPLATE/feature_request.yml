name: Feature request
description: Suggest an enhancement — a new cover feature, service, sensor, etc.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Note: capabilities are limited by what Netatmo's cloud API exposes.
        See the [API docs](https://dev.netatmo.com/apidocumentation/control)
        to check if the feature is technically possible before requesting.

  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
      description: Describe the feature and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case / example
      description: A concrete scenario where you'd use it.
    validations:
      required: true

  - type: textarea
    id: api-reference
    attributes:
      label: Netatmo API support
      description: |
        If you know the API endpoint or `target_position` value that enables this,
        link it here. Helps triage "possible" vs "hardware-limited".
